    </g>
    <text x="9" y="60" fill="#FFFFFF" font-family="Arial,sans-serif" font-size="16.5" font-weight="700" letter-spacing="2.4">OTTER</text>
    <text x="77.5" y="57.2" fill="#FFFFFF" font-family="Arial,sans-serif" font-size="3.6" letter-spacing=".4">TM</text>
    <path d="M10 65H90" stroke="#69B2C1" stroke-width=".7"/>
    <text x="10" y="70.5" fill="#FFFFFF" fill-opacity=".78" font-family="Arial,sans-serif" font-size="3.2" letter-spacing="1.05">PERFORMANCE MATERIALS</text>
