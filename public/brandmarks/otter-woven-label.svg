  <defs>
    <pattern id="weave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <path d="M0 0V3" stroke="#FFFFFF" stroke-opacity=".055" stroke-width=".55"/>
    </pattern>
  </defs>
  <g>
    <rect x="2" y="23" width="96" height="54" rx="1.5" fill="#154F7B" stroke="#E6EDF1" stroke-width="1.5"/>
    <rect x="5" y="26" width="90" height="48" rx=".5" fill="none" stroke="#E6EDF1" stroke-width=".65" stroke-dasharray="1.4 1.1"/>
    <rect x="3" y="24" width="94" height="52" fill="url(#weave)"/>
    <path d="M5 41H95" stroke="#E6EDF1" stroke-opacity=".72" stroke-width=".55"/>
    <text x="10" y="35.5" fill="#FFFFFF" font-family="Arial,sans-serif" font-size="5.2" font-weight="700" letter-spacing="1.65">GONYIK</text>
    <g fill="none" stroke="#69B2C1" stroke-width="1.15" stroke-linecap="square">
